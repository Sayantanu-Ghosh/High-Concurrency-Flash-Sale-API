# Spring Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/flash_sale_db?reWriteBatchedInserts=true
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari CP Connection Pool Config
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=FlashSaleHikariCP
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000

# JPA Properties
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Initialize Schema
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Redis Properties
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Server Properties
server.port=8080

# Async Thread Pool
app.async.core-pool-size=10
app.async.max-pool-size=20
app.async.queue-capacity=100000
app.async.thread-name-prefix=OrderWorker-

# Actuator and Prometheus Metrics
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always
